<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620"
     role="img" aria-label="A Bohr model of a carbon-12 atom. The nucleus at the centre holds six protons marked with a plus sign and six neutrons marked with a zero. Two electron shells surround it: an inner shell carrying two electrons and an outer shell carrying four, each electron marked with a minus sign. Labels identify the proton, neutron, nucleus, electron, and the inner and outer electron shells.">
  <title>Atomic structure: the carbon-12 atom</title>
  <style>
    /* Served through &lt;img&gt;, so page CSS cannot reach in. The palette is
       restated from globals.css and follows the reader's colour scheme via a
       media query, which does apply inside an img-loaded SVG.

       Charge is carried by BOTH colour and a glyph (+, 0, −). Colour alone
       would make the whole diagram unreadable to a red-green colour-blind
       learner, and charge is the one thing every question here turns on. */
    :root {
      --ink: oklch(0.25 0.02 255);
      --muted: oklch(0.51 0.018 255);
      --paper: oklch(0.985 0.006 85);
      --proton: oklch(0.52 0.16 25);
      --neutron: oklch(0.5 0.02 255);
      --electron: oklch(0.48 0.09 200);
      --shell: oklch(0.62 0.03 255);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --ink: oklch(0.93 0.01 80);
        --muted: oklch(0.7 0.012 80);
        --paper: oklch(0.21 0.008 75);
        --proton: oklch(0.72 0.15 27);
        --neutron: oklch(0.68 0.02 80);
        --electron: oklch(0.74 0.11 195);
        --shell: oklch(0.5 0.02 80);
      }
    }
    .bg { fill: var(--paper); }
    .shell { fill: none; stroke: var(--shell); stroke-width: 2;
             stroke-dasharray: 5 6; }
    .p { fill: var(--proton); }
    .n { fill: var(--neutron); }
    .e { fill: var(--electron); }
    .glyph { font-family: ui-monospace, "JetBrains Mono", monospace;
             font-size: 15px; font-weight: 700; fill: var(--paper);
             text-anchor: middle; dominant-baseline: central; }
    .eglyph { font-size: 13px; }
    .label { font-family: Inter, ui-sans-serif, system-ui, sans-serif;
             font-size: 18px; font-weight: 600; fill: var(--ink); }
    .sub { font-family: Inter, ui-sans-serif, system-ui, sans-serif;
           font-size: 14px; fill: var(--muted); }
    .lead { stroke: var(--muted); stroke-width: 1.5; fill: none; }
    .key { font-family: Inter, ui-sans-serif, system-ui, sans-serif;
           font-size: 15px; fill: var(--ink); }
  </style>

  <rect class="bg" width="900" height="620"/>

  <!-- Shells are drawn before the nucleus so the nucleus paints over them. -->
  <circle class="shell" cx="400" cy="300" r="120"/>
  <circle class="shell" cx="400" cy="300" r="215"/>

  <!-- Nucleus: one centre particle, a ring of five, then a ring of six.
       Spacing is set so no two particles touch — a learner has to be able to
       count six of each, and an overlapping pile makes that impossible. The
       rings alternate charge so neither colour clusters on one side. -->
  <g>
    <circle class="p" cx="400" cy="300" r="16"/><text class="glyph" x="400" y="300">+</text>

    <circle class="n" cx="400" cy="266" r="16"/><text class="glyph" x="400" y="266">0</text>
    <circle class="p" cx="368" cy="290" r="16"/><text class="glyph" x="368" y="290">+</text>
    <circle class="n" cx="380" cy="328" r="16"/><text class="glyph" x="380" y="328">0</text>
    <circle class="p" cx="420" cy="328" r="16"/><text class="glyph" x="420" y="328">+</text>
    <circle class="n" cx="432" cy="290" r="16"/><text class="glyph" x="432" y="290">0</text>

    <circle class="p" cx="470" cy="300" r="16"/><text class="glyph" x="470" y="300">+</text>
    <circle class="n" cx="435" cy="239" r="16"/><text class="glyph" x="435" y="239">0</text>
    <circle class="p" cx="365" cy="239" r="16"/><text class="glyph" x="365" y="239">+</text>
    <circle class="n" cx="330" cy="300" r="16"/><text class="glyph" x="330" y="300">0</text>
    <circle class="p" cx="365" cy="361" r="16"/><text class="glyph" x="365" y="361">+</text>
    <circle class="n" cx="435" cy="361" r="16"/><text class="glyph" x="435" y="361">0</text>
  </g>

  <!-- Inner shell: 2 electrons on the vertical axis. Outer shell: 4 on the
       diagonals, which keeps the horizontal and vertical axes clear for the
       leader lines. Carbon's four outer electrons are the point of the
       diagram, so they are spaced evenly and are all countable at a glance. -->
  <g>
    <circle class="e" cx="400" cy="180" r="13"/><text class="glyph eglyph" x="400" y="180">−</text>
    <circle class="e" cx="400" cy="420" r="13"/><text class="glyph eglyph" x="400" y="420">−</text>

    <circle class="e" cx="552" cy="148" r="13"/><text class="glyph eglyph" x="552" y="148">−</text>
    <circle class="e" cx="552" cy="452" r="13"/><text class="glyph eglyph" x="552" y="452">−</text>
    <circle class="e" cx="248" cy="148" r="13"/><text class="glyph eglyph" x="248" y="148">−</text>
    <circle class="e" cx="248" cy="452" r="13"/><text class="glyph eglyph" x="248" y="452">−</text>
  </g>

  <!-- Leaders run out to margins wide enough that no label overlaps artwork. -->
  <path class="lead" d="M 552 148 L 590 110 L 622 110"/>
  <text class="label" x="630" y="106">Electron</text>
  <text class="sub" x="630" y="126">negative, 6 in total</text>

  <path class="lead" d="M 460 244 L 530 215 L 622 215"/>
  <text class="label" x="630" y="211">Nucleus</text>
  <text class="sub" x="630" y="231">protons and neutrons</text>

  <!-- These two thread between the lower-right outer electron rather than
       through it: a leader that crosses a particle reads as pointing at it. -->
  <path class="lead" d="M 448 352 L 520 405 L 622 405"/>
  <text class="label" x="630" y="401">Neutron</text>
  <text class="sub" x="630" y="421">no charge, 6 of them</text>

  <path class="lead" d="M 428 342 L 470 500 L 622 500"/>
  <text class="label" x="630" y="496">Proton</text>
  <text class="sub" x="630" y="516">positive, 6 of them</text>

  <path class="lead" d="M 224 177 L 200 120 L 183 120"/>
  <text class="label" x="175" y="116" text-anchor="end">Outer shell</text>
  <text class="sub" x="175" y="136" text-anchor="end">holds 4 here</text>

  <path class="lead" d="M 302 231 L 250 200 L 183 200"/>
  <text class="label" x="175" y="196" text-anchor="end">Inner shell</text>
  <text class="sub" x="175" y="216" text-anchor="end">holds 2</text>

  <text class="key" x="40" y="580">Carbon-12: atomic number 6, mass number 12, no overall charge.</text>
</svg>
