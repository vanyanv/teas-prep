<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Schematic of an animal cell with structures labeled A through D">
  <rect width="800" height="600" fill="#f6f5fb"/>
  <!-- C: cell membrane + cytoplasm fill -->
  <path d="M120 300 Q120 110 360 100 Q680 90 690 300 Q700 510 380 510 Q120 500 120 300 Z"
        fill="#dceaf3" stroke="#3f78a6" stroke-width="14"/>
  <text x="150" y="150" font-family="monospace" font-size="34" font-weight="700" fill="#234a66" text-anchor="middle">C</text>
  <!-- D: cytoplasm (open area, lower left) -->
  <text x="230" y="430" font-family="monospace" font-size="34" font-weight="700" fill="#3a5a70" text-anchor="middle">D</text>
  <!-- A: nucleus -->
  <circle cx="410" cy="300" r="115" fill="#c9b6e0" stroke="#7a4fa6" stroke-width="4"/>
  <circle cx="410" cy="300" r="42" fill="#a786c9" stroke="#7a4fa6" stroke-width="3"/>
  <text x="410" y="312" font-family="monospace" font-size="40" font-weight="700" fill="#3f2860" text-anchor="middle">A</text>
  <!-- B: mitochondrion -->
  <g transform="translate(570 200) rotate(25)">
    <ellipse cx="0" cy="0" rx="80" ry="40" fill="#e7b59a" stroke="#b36a44" stroke-width="3"/>
    <path d="M-60 -8 q15 22 30 0 q15 22 30 0 q15 22 30 0" fill="none" stroke="#b36a44" stroke-width="4"/>
  </g>
  <text x="660" y="150" font-family="monospace" font-size="34" font-weight="700" fill="#8a4a28" text-anchor="middle">B</text>
</svg>
